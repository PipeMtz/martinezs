<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cajaRelativa{
            position: relative;
            height: 300px;
            width: 500px;
            border: 10px solid green;
            overflow: scroll;
        }
        .cajaAbsoluta{
            position: absolute;
            width: 50px;
            height: 50px;
            border: 5px solid blue;
            top: 50px;
            left: 50px;
        }
        .cajaAbsoluta:active{
            background-color: red;
        }
        #caja2{
            left: 100px;
        }
        .cajaFija{
            position: fixed;
            height:50px;
            width: 50px;
            top: 10px;
            right: 10px;
            border: 5px solid red;
        }
    </style>
</head>
<body>
    <div class="cajaRelativa"></div>
    <div id="caja2" class="cajaRelativa">
        <div class="cajaAbsoluta"></div>
    </div>
        
    <div class="cajaRelativa"></div>
    <div class="cajaRelativa"></div>
    <div class="cajaRelativa"></div>
    <div class="cajaRelativa"></div>
    <div class="cajaRelativa"></div>
    <div class="cajaRelativa"></div>
    <div class="cajaFija"></div>
    <div class="cajaRelativa"></div>
</body>
</html>
